<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#5b5cf0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TwoChat">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/chat-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/chat-icon.svg">
    <title>Chat</title>
    <style>
        @font-face {
            font-family: 'Vazirmatn';
            src: url('/assets/fonts/vazirmatn-400.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Vazirmatn';
            src: url('/assets/fonts/vazirmatn-500.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Vazirmatn';
            src: url('/assets/fonts/vazirmatn-700.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #1565C0;
            --primary-dark: #0D47A1;
            --primary-light: #E3F2FD;
            --outgoing: #E1FFC7;
            --incoming: #FFFFFF;
            --bg: #E6EBEE;
            --dark-bg: #0F1419;
            --text: #000000;
            --text-secondary: #6B7C8F;
            --time: #6B7C8F;
            --check: #4FC3F7;
            --border: #CFD8DC;
            --shadow: 0 6px 20px rgba(0,0,0,0.16);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        html { font-size: 16px; -webkit-text-size-adjust: 100%; }
        
        body {
            font-family: 'Vazirmatn', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            color: var(--text);
        }
        
        .hidden { display: none !important; }
        
        /* ========== LOGIN ========== */
        .login-screen {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px;
        }
        
        .login-card {
            width: 100%;
            max-width: 360px;
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .login-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: var(--primary);
        }
        
        .login-icon svg { width: 40px; height: 40px; }
        
        .login-header h1 { font-size: 24px; font-weight: 700; color: var(--primary-dark); }
        .login-header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
        
        .login-form { display: flex; flex-direction: column; gap: 16px; }
        
        .input-field {
            position: relative;
        }
        
        .input-field input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .input-field input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }
        
        .input-field label {
            position: absolute;
            right: 14px;
            top: -8px;
            background: white;
            padding: 0 6px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .btn {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        
        .btn:active { transform: scale(0.98); }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(21,101,192,0.3);
        }
        
        .btn-primary:active { background: var(--primary-dark); }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* ========== CHAT ========== */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            max-width: 900px;
            margin: 0 auto;
            background: var(--dark-bg);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }
        
        /* Header */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: calc(8px + var(--safe-top)) 16px 12px;
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow);
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        
        .header-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .header-btn:active { background: rgba(255,255,255,0.15); }
        
        .header-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            position: relative;
            flex-shrink: 0;
        }
        
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: #4CAF50;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        .online-dot.offline {
            background: rgba(255,255,255,0.20);
            border-color: rgba(255,255,255,0.18);
        }
        
        .header-text { flex: 1; min-width: 0; }
        .header-text h2 { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .header-text span { font-size: 13px; opacity: 0.9; }
        
        /* Messages Area */
        .messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--dark-bg);
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23182433' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            -webkit-overflow-scrolling: touch;
        }
        
        .date-separator {
            text-align: center;
            margin: 12px 0;
        }
        
        .date-separator span {
            background: rgba(130,170,210,0.35);
            color: rgba(255,255,255,0.9);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .message-highlight {
            outline: 2px solid rgba(16, 185, 129, 0.65);
            outline-offset: 2px;
            transition: outline-color 0.3s ease;
        }

        .archive-overlay {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 12px;
            padding-bottom: max(12px, var(--safe-bottom));
        }
        .archive-overlay.hidden { display: none !important; }
        .archive-panel {
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            background: #fff;
            border-radius: 20px 20px 12px 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .archive-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--primary);
            color: #fff;
        }
        .archive-header h3 { font-size: 16px; font-weight: 600; }
        .archive-close {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
        }
        .archive-body {
            overflow-y: auto;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .archive-section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .archive-thumb {
            position: relative;
            border: none;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            background: var(--border);
            aspect-ratio: 1;
        }
        .archive-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .archive-thumb-meta {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 4px 6px;
            font-size: 10px;
            color: #fff;
            background: linear-gradient(transparent, rgba(0,0,0,0.65));
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .archive-empty {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 12px;
            text-align: center;
            background: rgba(0,0,0,0.04);
            border-radius: 12px;
        }
        .archive-voice-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.03);
        }
        .archive-voice-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 12px;
            min-width: 0;
        }
        .archive-voice-info strong { font-size: 13px; }
        .archive-voice-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .archive-voice-play,
        .archive-voice-jump {
            border: none;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .archive-voice-play { background: var(--primary); color: #fff; }
        .archive-voice-jump { background: var(--border); color: var(--text); }
        .archive-audio { display: none; }
        
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            animation: messageIn 0.25s ease;
            box-shadow: 0 4px 18px rgba(0,0,0,0.14);
        }
        
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: none; }
        }
        
        .message.outgoing {
            align-self: flex-end;
            background: var(--outgoing);
            color: var(--text);
            border-bottom-right-radius: 4px;
        }
        
        .message.incoming {
            align-self: flex-start;
            background: var(--incoming);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        
        .message-content {
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        .message-media {
            margin: -10px -14px -6px;
            border-radius: 18px;
            overflow: hidden;
        }
        
        .message.outgoing .message-media { border-radius: 18px 18px 4px 18px; }
        .message.incoming .message-media { border-radius: 18px 18px 18px 4px; }
        
        .message-media img {
            display: block;
            max-width: 280px;
            width: 100%;
            height: auto;
            cursor: pointer;
        }
        
        .message-voice {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            padding: 4px 0;
        }
        
        .voice-btn {
            width: 38px;
            height: 38px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .voice-btn:active { transform: scale(0.95); }
        
        .voice-wave {
            flex: 1;
            height: 24px;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        
        .voice-wave span {
            flex: 1;
            max-width: 3px;
            background: var(--primary);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
            animation-play-state: paused;
        }
        
        .voice-wave span:nth-child(odd) { animation-delay: 0.15s; }

        .message-voice.is-playing .voice-wave span {
            animation-play-state: running;
        }

        .voice-timeline {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .voice-bar {
            width: 100%;
            height: 6px;
            background: rgba(16, 185, 129, 0.18);
            border-radius: 999px;
            overflow: hidden;
        }

        .voice-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            border-radius: 999px;
        }

        .voice-times {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            align-items: center;
            font-size: 11px;
            color: var(--time);
            white-space: nowrap;
        }

        .voice-current {
            color: var(--time);
        }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
            50% { transform: scaleY(1.2); opacity: 1; }
        }
        
        .voice-duration { font-size: 12px; color: var(--time); font-weight: 500; }
        
        .message-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        
        .message-time { font-size: 11px; color: var(--time); }
        .message.outgoing .message-time { color: #4A7C59; }
        
        .message-status { color: var(--check); }
        .message-status svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }
        .message-status.sent { opacity: 0.55; }
        .message-status.read { opacity: 1; color: #28a745; } /* green double-check */
        .ticks { display: inline-flex; align-items: center; gap: 2px; line-height: 1; }
        .tick { display: inline-flex; }
        .tick svg { stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .ticks-read .tick-2 { margin-right: -3px; } /* bring checks closer */
        .message-edited { font-size: 11px; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 999px; }
        .message-reactions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .reaction-chip { border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.08); color: #fff; border-radius: 999px; padding: 3px 8px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
        .message.outgoing .reaction-chip { border-color: rgba(0,0,0,0.12); background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.75); }
        .reaction-count { font-size: 12px; opacity: 0.9; }

        .reaction-picker {
            position: fixed;
            z-index: 9999;
            display: flex;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(18, 24, 45, 0.88);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 18px 50px rgba(0,0,0,0.35);
        }
        .reaction-item {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reaction-item:active { transform: scale(0.97); }

        .reply-btn {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            color: rgba(16, 185, 129, 0.9);
        }

        .reply-btn:active {
            transform: scale(0.97);
        }

        .message.outgoing .reply-btn {
            color: rgba(0,0,0,0.45);
        }
        
        /* Image Preview */
        .preview-bar {
            background: white;
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            flex-shrink: 0;
        }
        
        .preview-content {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .preview-thumb {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--border);
        }
        
        .preview-info {
            flex: 1;
            min-width: 0;
        }
        
        .preview-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .preview-size { font-size: 12px; color: var(--text-secondary); }
        .preview-note { font-size: 11px; color: #F57C00; margin-top: 2px; }
        
        .preview-actions { display: flex; gap: 8px; }
        
        .btn-sm {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
        }
        
        .btn-cancel { background: var(--border); color: var(--text); }
        .btn-send { background: var(--primary); color: white; }
        
        /* Composer */
        .composer {
            background: white;
            border-top: 1px solid var(--border);
            padding: 8px 12px calc(8px + var(--safe-bottom));
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        /* Reply bar (composer) */
        .reply-bar {
            margin: 0 6px 8px;
            border-radius: 16px;
            padding: 10px 12px;
            border: 1px solid rgba(0,0,0,0.06);
            background: rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 10px;
            direction: rtl;
            text-align: right;
        }

        .reply-bar.hidden { display: none !important; }
        .edit-bar { margin: 0 6px 8px; border-radius: 16px; padding: 10px 12px; border: 1px solid rgba(0,0,0,0.06); background: rgba(0,0,0,0.04); display: flex; align-items: center; gap: 10px; direction: rtl; text-align: right; }
        .edit-bar.hidden { display: none !important; }
        .edit-bar-title { font-size: 12px; font-weight: 700; color: var(--primary-dark); }
        .edit-bar-text { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70vw; }
        .edit-cancel { width: 28px; height: 28px; border-radius: 10px; border: none; background: rgba(0,0,0,0.06); cursor: pointer; font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }

        .reply-bar-left {
            flex: 1;
            min-width: 0;
        }

        .reply-bar-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 2px;
        }

        .reply-bar-text {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            direction: rtl;
            text-align: right;
        }

        .reply-cancel {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: none;
            background: rgba(0,0,0,0.06);
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reply-cancel:active { transform: scale(0.97); }

        /* Reply snippet inside message bubble */
        .reply-in-message {
            border-radius: 12px;
            background: rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 8px 10px;
            margin-bottom: 8px;
        }

        .reply-in-message .reply-in-title {
            font-size: 12px;
            font-weight: 700;
            opacity: 0.9;
            margin-bottom: 2px;
        }

        .reply-in-message .reply-in-text {
            font-size: 13px;
            opacity: 0.85;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .composer-inner {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            direction: rtl;
            justify-content: flex-start;
            background: var(--bg);
            border-radius: 24px;
            padding: 6px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);
        }
        
        .composer-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        
        .composer-btn:active { background: rgba(0,0,0,0.06); color: var(--primary); }
        
        .composer-input {
            flex: 1;
            min-width: 0;
            padding: 10px 8px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            max-height: 120px;
            resize: none;
            direction: rtl;
            text-align: right;
            unicode-bidi: plaintext;
        }
        
        .composer-input::placeholder { color: var(--text-secondary); }
        
        .composer-btn.record { background: var(--primary); color: white; }
        .composer-btn.send { background: var(--primary); color: white; margin-right: auto; }
        .composer-btn.send svg { transform: scaleX(-1); display: block; }
        
        /* Emoji Picker Overlay */
        .emoji-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        
        .emoji-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 16px;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .emoji-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .emoji-header h3 { font-size: 18px; font-weight: 600; }
        .emoji-close { font-size: 24px; cursor: pointer; padding: 4px; }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
        }
        .emoji-item {
            border: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            font-size: 22px;
            line-height: 1;
            padding: 8px 4px;
            cursor: pointer;
        }
        .emoji-item:active {
            transform: scale(0.95);
        }
        
        /* Sticker Panel */
        .sticker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        
        .sticker-panel {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px 20px 0 0;
            max-height: 50vh;
            display: flex;
            flex-direction: column;
        }
        
        .sticker-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .sticker-header h3 { font-size: 18px; font-weight: 600; }
        
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }
        
        .sticker-item {
            aspect-ratio: 1;
            border: none;
            background: var(--bg);
            border-radius: 12px;
            cursor: pointer;
            padding: 8px;
            transition: transform 0.15s;
        }
        
        .sticker-item:active { transform: scale(0.95); }
        
        .sticker-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .sticker-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        /* Voice Recording Panel */
        .voice-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .voice-panel {
            width: 90%;
            max-width: 320px;
            background: white;
            border-radius: 24px;
            padding: 28px;
            text-align: center;
        }
        
        .voice-indicator {
            width: 80px;
            height: 80px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .voice-timer { font-size: 32px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .voice-hint { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
        
        .voice-actions {
            display: flex;
            justify-content: center;
            gap: 24px;
        }
        
        .voice-action-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s;
        }
        
        .voice-action-btn:active { transform: scale(0.95); }
        
        .voice-delete { background: #FFEBEE; color: #D32F2F; }
        .voice-send { background: var(--primary-light); color: var(--primary); }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 300;
            max-width: 90%;
            text-align: center;
            animation: toastIn 0.3s ease;
        }

        /* Top banner (for successful send) */
        .banner {
            position: fixed;
            top: calc(12px + var(--safe-top));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.86);
            color: #fff;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            z-index: 400;
            max-width: 92%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            animation: bannerIn 0.22s ease;
        }

        .banner.hidden { display: none !important; }

        @keyframes bannerIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.98); }
            to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        }
        
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* Attach Menu */
        .attach-menu {
            position: absolute;
            bottom: 70px;
            right: 16px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 8px;
            min-width: 180px;
        }
        
        .attach-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .attach-item:active { background: var(--bg); }
        
        .attach-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .attach-icon.photo { background: #E3F2FD; color: #1976D2; }
        .attach-icon.sticker { background: #FFF3E0; color: #F57C00; }
        
        /* Responsive */
        @media (min-width: 768px) {
            .message { max-width: 70%; }
            .message-media img { max-width: 320px; }
        }
        
        @media (max-width: 380px) {
            .message { max-width: 90%; }
            .message-media img { max-width: 220px; }
        }

        /* ========== MODERN MOBILE REDESIGN OVERRIDES ========== */
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --outgoing: linear-gradient(140deg, #10b981 0%, #059669 100%);
            --incoming: linear-gradient(140deg, #1f2937 0%, #111827 100%);
            --bg: #0a0e1a;
            --dark-bg: radial-gradient(circle at top right, #1a2540 0%, #111827 45%, #0a0e1a 100%);
            --text: #f9fafb;
            --text-secondary: #9ca3af;
            --time: #d1d5db;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 18px 42px rgba(8, 12, 27, 0.42);
        }

        body {
            background: #090f20;
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 0;
        }

        .chat-container {
            width: min(100vw, 430px);
            max-width: 430px;
            height: 100dvh;
            background: var(--dark-bg);
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .chat-header {
            position: sticky;
            top: 0;
            background: rgba(14, 21, 43, 0.72);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: none;
            padding-top: calc(10px + var(--safe-top));
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.09);
            color: #f0f3ff;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-text span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.12);
            margin-top: 4px;
        }

        .avatar {
            background: linear-gradient(145deg, #10b981, #059669);
            color: #fff;
            box-shadow: 0 10px 22px rgba(16, 185, 129, 0.44);
        }

        .online-dot {
            border-color: #059669;
        }

        .messages {
            padding: 16px 12px 22px;
            background: transparent;
            background-image: none;
            gap: 11px;
        }

        .date-separator span {
            background: rgba(255, 255, 255, 0.09);
            color: #ecf0ff;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
        }

        .message {
            max-width: 84%;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 11px 14px;
        }

        .message.outgoing {
            background: var(--outgoing);
            color: #fff;
            border-bottom-right-radius: 10px;
        }

        .message.incoming {
            background: var(--incoming);
            color: #edf1ff;
            border-bottom-left-radius: 10px;
        }

        .message-content {
            font-size: 15px;
            line-height: 1.68;
        }

        .message-time,
        .message.outgoing .message-time {
            color: #c8d0ef;
        }

        .message-edited {
            color: rgba(239, 244, 255, 0.86);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .reaction-chip {
            border-color: rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .voice-btn {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }

        .voice-wave span {
            background: rgba(255, 255, 255, 0.82);
        }

        .voice-bar {
            background: rgba(255, 255, 255, 0.24);
        }

        .voice-bar-fill {
            background: linear-gradient(90deg, #f6f7ff, #cfd6ff);
        }

        .composer {
            background: rgba(9, 14, 30, 0.84);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 10px 10px calc(10px + var(--safe-bottom));
            box-shadow: 0 -16px 35px rgba(8, 12, 24, 0.34);
        }

        .composer-inner {
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            padding: 6px;
            box-shadow: none;
            direction: rtl;
        }

        .composer-input {
            color: #fff;
            font-size: 15px;
            line-height: 1.55;
            padding: 11px 8px;
            direction: rtl;
            text-align: right;
            unicode-bidi: plaintext;
        }

        .composer-input::placeholder {
            color: #bac4e8;
        }

        .composer-btn {
            color: #dce4ff;
        }

        .composer-btn.record,
        .composer-btn.send {
            background: linear-gradient(140deg, #10b981, #059669);
            color: #fff;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.44);
        }

        .reply-bar,
        .edit-bar {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.14);
        }

        .reply-bar-title,
        .edit-bar-title {
            color: #f4f7ff;
        }

        .reply-bar-text,
        .edit-bar-text {
            color: #b4bee4;
        }

        .reply-cancel,
        .edit-cancel {
            background: rgba(255, 255, 255, 0.09);
            color: #edf2ff;
        }

        .reply-in-message {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.11);
        }

        .preview-bar,
        .sticker-panel,
        .emoji-container,
        .voice-panel,
        .attach-menu {
            background: #121a34;
            color: #edf1ff;
            border-color: rgba(255, 255, 255, 0.12);
        }

        .preview-name,
        .sticker-header h3,
        .emoji-header h3 {
            color: #f4f6ff;
        }

        .preview-size,
        .voice-hint,
        .sticker-empty {
            color: #b9c2e5;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.14);
            color: #e9eeff;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn-send {
            background: linear-gradient(140deg, #10b981, #059669);
        }

        .emoji-item,
        .sticker-item,
        .attach-item {
            transition: transform 0.12s ease, background 0.18s ease;
        }

        .emoji-item:active,
        .sticker-item:active,
        .attach-item:active {
            transform: scale(0.96);
        }

        .emoji-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.11);
        }

        .sticker-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .attach-menu {
            right: max(12px, calc((100vw - min(100vw, 430px)) / 2 + 12px));
            bottom: calc(80px + var(--safe-bottom));
            width: 196px;
            box-shadow: 0 16px 35px rgba(2, 6, 18, 0.58);
        }

        .attach-item {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
        }

        .attach-item + .attach-item {
            margin-top: 6px;
        }

        .archive-panel {
            background: rgba(18, 24, 45, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.12);
            width: min(100vw, 430px);
            max-width: 430px;
            border-radius: 20px 20px 0 0;
        }

        .archive-header {
            border-bottom-color: rgba(255, 255, 255, 0.1);
        }

        .archive-section-title { color: #c6ceed; }

        .archive-empty {
            background: rgba(255, 255, 255, 0.07);
            color: #bcc4e7;
        }

        .archive-voice-row {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .archive-voice-jump {
            background: rgba(255, 255, 255, 0.14);
            color: #eaf0ff;
        }

        .message-highlight {
            outline-color: rgba(16, 185, 129, 0.88);
        }

        .toast {
            background: rgba(16, 22, 43, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #f5f7ff;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.45);
        }

        .banner {
            background: rgba(19, 28, 52, 0.95);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .login-screen {
            width: 100vw;
            min-height: 100dvh;
            padding: 18px;
        }

        .login-card {
            width: min(100%, 430px);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
        }

        .emoji-overlay,
        .sticker-overlay,
        .archive-overlay {
            align-items: flex-end;
            justify-content: center;
        }

        .emoji-container,
        .sticker-panel {
            width: min(100vw, 430px);
            max-width: 430px;
            border-radius: 22px 22px 0 0;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        @media (min-width: 768px) {
            body {
                background:
                    radial-gradient(circle at 16% 22%, rgba(16, 185, 129, 0.18), transparent 35%),
                    radial-gradient(circle at 82% 78%, rgba(245, 158, 11, 0.08), transparent 42%),
                    #080d1c;
                padding: 24px;
            }

            .chat-container {
                height: min(920px, calc(100dvh - 48px));
                border-radius: 30px;
                overflow: hidden;
            }

            .chat-header {
                border-top-left-radius: 30px;
                border-top-right-radius: 30px;
            }

            .composer {
                border-bottom-left-radius: 30px;
                border-bottom-right-radius: 30px;
            }
        }

        @media (max-width: 480px) {
            body {
                display: block;
            }

            .chat-container {
                width: 100vw;
                max-width: 100vw;
                border-radius: 0;
                border: none;
                box-shadow: none;
                height: 100dvh;
            }

            .emoji-container,
            .sticker-panel {
                width: 100vw;
                max-width: 100vw;
                border: none;
            }

            .attach-menu {
                right: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <h1>گفتگو</h1>
                <p>وارد شوید</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="input-field">
                    <label for="username">نام کاربری</label>
                    <input type="text" id="username" name="username" autocomplete="username" 
                           autocapitalize="none" autocorrect="off" spellcheck="false" required>
                </div>
                <button type="submit" class="btn btn-primary">ورود</button>
            </form>
            
            <div class="login-footer">در این مرورگر ذخیره می‌شود</div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="chat-container hidden">
        <header class="chat-header">
            <button id="logoutBtn" class="header-btn" aria-label="خروج">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
            </button>
            
            <div class="header-info">
                <div class="avatar">
                    <span id="userInitial">●</span>
                    <span class="online-dot"></span>
                </div>
                <div class="header-text">
                    <h2 id="chatTitle">گفتگو</h2>
                    <span id="presenceText">آفلاین</span>
                </div>
            </div>
            
            <button id="archiveBtn" class="header-btn" type="button" aria-label="آرشیو رسانه">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="3" ry="3"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                </svg>
            </button>
        </header>

        <main id="messages" class="messages"></main>

        <!-- Media archive -->
        <div id="archiveOverlay" class="archive-overlay hidden" aria-hidden="true">
            <div id="archivePanel" class="archive-panel" role="dialog" aria-labelledby="archiveTitle">
                <div class="archive-header">
                    <h3 id="archiveTitle">آرشیو رسانه</h3>
                    <button type="button" id="archiveClose" class="archive-close" aria-label="بستن">×</button>
                </div>
                <div class="archive-body">
                    <section>
                        <div class="archive-section-title">عکس‌ها</div>
                        <div id="archiveImages" class="archive-grid"></div>
                    </section>
                    <section>
                        <div class="archive-section-title">ویس‌ها</div>
                        <div id="archiveVoices" class="archive-voice-list"></div>
                    </section>
                </div>
            </div>
        </div>

        <!-- Image Preview -->
        <div id="imagePreview" class="preview-bar hidden">
            <div class="preview-content">
                <img id="previewThumb" class="preview-thumb" alt="">
                <div class="preview-info">
                    <div id="previewName" class="preview-name"></div>
                    <div id="previewSize" class="preview-size"></div>
                    <div class="preview-note">فشرده‌سازی خودکار پس از ارسال</div>
                </div>
                <div class="preview-actions">
                    <button id="previewCancel" class="btn-sm btn-cancel">انصراف</button>
                    <button id="previewSend" class="btn-sm btn-send">ارسال</button>
                </div>
            </div>
        </div>

        <!-- Composer -->
        <footer class="composer">
            <div id="editBar" class="edit-bar hidden">
                <div class="reply-bar-left">
                    <div class="edit-bar-title">ویرایش پیام</div>
                    <div id="editBarText" class="edit-bar-text"></div>
                </div>
                <button id="editCancel" class="edit-cancel" aria-label="لغو ویرایش">×</button>
            </div>
            <div id="replyBar" class="reply-bar hidden">
                <div class="reply-bar-left">
                    <div class="reply-bar-title">ریپلای</div>
                    <div id="replyBarText" class="reply-bar-text"></div>
                </div>
                <button id="replyCancel" class="reply-cancel" aria-label="لغو ریپلای">×</button>
            </div>
            <div class="composer-inner">
                <button id="emojiBtn" class="composer-btn" aria-label="ایموجی">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
                    </svg>
                </button>
                
                <button id="attachBtn" class="composer-btn" aria-label="پیوست">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>

                <textarea id="messageInput" class="composer-input" placeholder="پیام..." rows="1"></textarea>

                <button id="voiceBtn" class="composer-btn record" aria-label="صدا">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
                    </svg>
                </button>

                <button id="sendBtn" class="composer-btn send hidden" aria-label="ارسال">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Emoji Overlay -->
    <div id="emojiOverlay" class="emoji-overlay hidden">
        <div class="emoji-container">
            <div class="emoji-header">
                <h3>ایموجی</h3>
                <span id="emojiClose" class="emoji-close">×</span>
            </div>
            <div id="emojiPicker"></div>
        </div>
    </div>

    <!-- Sticker Overlay -->
    <div id="stickerOverlay" class="sticker-overlay hidden">
        <div class="sticker-panel">
            <div class="sticker-header">
                <h3>استیکر</h3>
                <button id="stickerClose" class="btn-sm btn-cancel">بستن</button>
            </div>
            <div id="stickerGrid" class="sticker-grid">
                <div class="sticker-empty">استیکری وجود ندارد</div>
            </div>
        </div>
    </div>

    <!-- Voice Recording Overlay -->
    <div id="voiceOverlay" class="voice-overlay hidden">
        <div class="voice-panel">
            <div class="voice-indicator">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </div>
            <div id="voiceTimer" class="voice-timer">0:00</div>
            <div class="voice-hint">در حال ضبط صدا</div>
            <div class="voice-actions">
                <button id="voiceDelete" class="voice-action-btn voice-delete" aria-label="حذف">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
                <button id="voiceSend" class="voice-action-btn voice-send" aria-label="ارسال">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Attach Menu -->
    <div id="attachMenu" class="attach-menu hidden">
        <div class="attach-item" id="attachPhoto">
            <div class="attach-icon photo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                </svg>
            </div>
            <span>عکس</span>
        </div>
        <div class="attach-item" id="attachSticker">
            <div class="attach-icon sticker">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M8 12h8M12 8v8"/>
                </svg>
            </div>
            <span>استیکر</span>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="fileInput" accept="image/*" hidden>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
    <div id="banner" class="banner hidden"></div>

    <script src="/app.js"></script>
</body>
</html>
