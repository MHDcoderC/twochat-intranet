<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TwoChat">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/chat-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/chat-icon.svg">
    <link rel="stylesheet" href="/css/styles.css">
    <title>Chat</title>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <h1>گفتگو</h1>
                <p>وارد شوید</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="input-field">
                    <label for="username">نام کاربری</label>
                    <input type="text" id="username" name="username" autocomplete="username"
                           autocapitalize="none" autocorrect="off" spellcheck="false" required>
                </div>
                <button type="submit" class="btn btn-primary">ورود</button>
            </form>
            <div class="login-footer">در این مرورگر ذخیره می‌شود</div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="chat-container hidden">
        <header class="chat-header">
            <button id="logoutBtn" class="header-btn" aria-label="خروج">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
            </button>
            <div class="header-info">
                <div class="avatar">
                    <span id="userInitial">●</span>
                    <span class="online-dot"></span>
                </div>
                <div class="header-text">
                    <h2 id="chatTitle">گفتگو</h2>
                    <span id="presenceText">آفلاین</span>
                </div>
            </div>
            <button id="archiveBtn" class="header-btn" type="button" aria-label="آرشیو رسانه">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="3" ry="3"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                </svg>
            </button>
        </header>

        <main id="messages" class="messages"></main>

        <!-- Media Archive -->
        <div id="archiveOverlay" class="archive-overlay hidden" aria-hidden="true">
            <div id="archivePanel" class="archive-panel" role="dialog" aria-labelledby="archiveTitle">
                <div class="archive-header">
                    <h3 id="archiveTitle">آرشیو رسانه</h3>
                    <button type="button" id="archiveClose" class="archive-close" aria-label="بستن">×</button>
                </div>
                <div class="archive-body">
                    <section>
                        <div class="archive-section-title">عکس‌ها</div>
                        <div id="archiveImages" class="archive-grid"></div>
                    </section>
                    <section>
                        <div class="archive-section-title">ویس‌ها</div>
                        <div id="archiveVoices" class="archive-voice-list"></div>
                    </section>
                </div>
            </div>
        </div>

        <!-- Image Preview -->
        <div id="imagePreview" class="preview-bar hidden">
            <div class="preview-content">
                <img id="previewThumb" class="preview-thumb" alt="">
                <div class="preview-info">
                    <div id="previewName" class="preview-name"></div>
                    <div id="previewSize" class="preview-size"></div>
                    <div class="preview-note">فشرده‌سازی خودکار پس از ارسال</div>
                </div>
                <div class="preview-actions">
                    <button id="previewCancel" class="btn-sm btn-cancel">انصراف</button>
                    <button id="previewSend" class="btn-sm btn-send">ارسال</button>
                </div>
            </div>
        </div>

        <!-- Composer -->
        <footer class="composer">
            <div id="editBar" class="edit-bar hidden">
                <div class="reply-bar-left">
                    <div class="edit-bar-title">ویرایش پیام</div>
                    <div id="editBarText" class="edit-bar-text"></div>
                </div>
                <button id="editCancel" class="edit-cancel" aria-label="لغو ویرایش">×</button>
            </div>
            <div id="replyBar" class="reply-bar hidden">
                <div class="reply-bar-left">
                    <div class="reply-bar-title">ریپلای</div>
                    <div id="replyBarText" class="reply-bar-text"></div>
                </div>
                <button id="replyCancel" class="reply-cancel" aria-label="لغو ریپلای">×</button>
            </div>
            <div class="composer-inner">
                <button id="emojiBtn" class="composer-btn" aria-label="ایموجی">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
                    </svg>
                </button>
                <button id="attachBtn" class="composer-btn" aria-label="پیوست">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <textarea id="messageInput" class="composer-input" placeholder="پیام..." rows="1"></textarea>
                <button id="voiceBtn" class="composer-btn record" aria-label="صدا">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
                    </svg>
                </button>
                <button id="sendBtn" class="composer-btn send hidden" aria-label="ارسال">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Emoji Overlay -->
    <div id="emojiOverlay" class="emoji-overlay hidden">
        <div class="emoji-container">
            <div class="emoji-header">
                <h3>ایموجی</h3>
                <span id="emojiClose" class="emoji-close">×</span>
            </div>
            <div id="emojiPicker"></div>
        </div>
    </div>

    <!-- Sticker Overlay -->
    <div id="stickerOverlay" class="sticker-overlay hidden">
        <div class="sticker-panel">
            <div class="sticker-header">
                <h3>استیکر</h3>
                <button id="stickerClose" class="btn-sm btn-cancel">بستن</button>
            </div>
            <div id="stickerGrid" class="sticker-grid">
                <div class="sticker-empty">استیکری وجود ندارد</div>
            </div>
        </div>
    </div>

    <!-- Voice Recording Overlay -->
    <div id="voiceOverlay" class="voice-overlay hidden">
        <div class="voice-panel">
            <div class="voice-indicator">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </div>
            <div id="voiceTimer" class="voice-timer">0:00</div>
            <div class="voice-hint">در حال ضبط صدا</div>
            <div class="voice-actions">
                <button id="voiceDelete" class="voice-action-btn voice-delete" aria-label="حذف">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
                <button id="voiceSend" class="voice-action-btn voice-send" aria-label="ارسال">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Attach Menu -->
    <div id="attachMenu" class="attach-menu hidden">
        <div class="attach-item" id="attachPhoto">
            <div class="attach-icon photo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                </svg>
            </div>
            <span>عکس</span>
        </div>
        <div class="attach-item" id="attachSticker">
            <div class="attach-icon sticker">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M8 12h8M12 8v8"/>
                </svg>
            </div>
            <span>استیکر</span>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" hidden>
    <div id="toast" class="toast hidden"></div>
    <div id="banner" class="banner hidden"></div>

    <script src="/js/app.js" type="module"></script>
</body>
</html>
